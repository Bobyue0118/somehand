# Retargeting config: MediaPipe -> DexRobot DexHand021
# Uses the simplified URDF/MJCF export. Finger numbering is:
#   1=thumb, 2=index, 3=middle, 4=ring, 5=pinky

hand:
  name: "dexhand021_right"
  side: "right"
  mjcf_path: "../../../assets/mjcf/dexhand021_right/model.xml"

retargeting:
  type: "vector"

  human_vector_pairs:
