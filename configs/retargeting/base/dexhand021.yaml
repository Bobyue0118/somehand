    - [0, 4]
    - [1, 4]
    - [1, 2]
    - [1, 3]
    - [2, 3]
    - [2, 4]
    - [3, 4]
    # Index
    - [5, 6]
    - [6, 8]
    - [7, 8]
    # Middle
    - [9, 10]
    - [10, 12]
    - [11, 12]
    # Ring
    - [13, 14]
    - [14, 16]
    - [15, 16]
    # Little
    - [17, 18]
    - [18, 20]
    - [19, 20]

