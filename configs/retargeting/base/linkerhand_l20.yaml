# Retargeting config: MediaPipe -> Linkerhand L20 Right Hand
#
# The palm-base vectors, pinch loss, and thumb position constraints were making
# the optimizer fight itself on recorded PICO data. This version now keeps the
# informative non-palm vectors but matches them with vector residuals (like
# dex-retargeting) instead of direction-only cosine loss, which makes distal
# joints much more observable.

hand:
  name: "linkerhand_l20_right"
  side: "right"
  mjcf_path: "../../../assets/mjcf/linkerhand_l20_right/model.xml"

retargeting:
  type: "vector"

  human_vector_pairs:
    # Thumb
    - [0, 4]
    - [1, 4]
    - [1, 2]
    - [1, 3]
    - [2, 3]
    - [2, 4]
    - [3, 4]
    # Index
    - [5, 6]
    - [6, 8]
    - [7, 8]
    # Middle
    - [9, 10]
    - [10, 12]
    - [11, 12]
    # Ring
    - [13, 14]
    - [14, 16]
    - [15, 16]
    # Little
    - [17, 18]
    - [18, 20]
    - [19, 20]

  origin_link_names:
    - "world"
    - "thumb_metacarpals_base1"
    - "thumb_metacarpals_base1"
    - "thumb_metacarpals_base1"
    - "thumb_metacarpals"
    - "thumb_metacarpals"
    - "thumb_distal"
    - "index_metacarpals"
    - "index_proximal"
    - "index_distal"
    - "middle_metacarpals"
    - "middle_proximal"
    - "middle_distal"
    - "ring_metacarpals"
    - "ring_proximal"
    - "ring_distal"
    - "pinky_metacarpals"
    - "pinky_proximal"
    - "pinky_distal"

  task_link_names:
    - "thumb_distal_tip"
    - "thumb_distal_tip"
    - "thumb_metacarpals"
    - "thumb_proximal"
    - "thumb_proximal"
    - "thumb_distal_tip"
    - "thumb_distal_tip"
    - "index_middle"
    - "index_distal_tip"
    - "index_distal_tip"
    - "middle_middle"
    - "middle_distal_tip"
    - "middle_distal_tip"
    - "ring_middle"
    - "ring_distal_tip"
    - "ring_distal_tip"
    - "pinky_middle"
    - "pinky_distal_tip"
    - "pinky_distal_tip"

  origin_link_types:
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"

  task_link_types:
    - "site"
    - "site"
    - "body"
    - "body"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"

  vector_weights:
    - 2.2
    - 1.8
    - 1.2
    - 1.2
    - 1.2
    - 1.4
    - 1.4
    - 1.0
    - 1.0
    - 0.8
    - 1.0
    - 1.0
    - 0.8
    - 1.0
    - 1.0
    - 0.8
    - 1.0
    - 1.0
    - 0.8

  vector_loss:
    type: "residual"
    huber_delta: 0.02
    scaling: 1.0
    scale_landmarks: [0, 9]
    scale_bodies: ["world", "middle_proximal"]
    scale_body_types: ["body", "body"]

  preprocess:
    temporal_filter_alpha: 0.50

  solver:
    max_iterations: 60
    norm_delta: 0.004
    output_alpha: 0.80
